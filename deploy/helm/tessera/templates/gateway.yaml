{{- $firstWorker := index .Values.workers 0 -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tessera.fullname" . }}-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tessera.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  type: ClusterIP
  selector:
    {{- include "tessera.selectorLabels" (merge (dict "component" "gateway") .) | nindent 4 }}
  ports:
    - name: client
      port: {{ .Values.gateway.servicePort }}
      targetPort: client
    {{- if .Values.metrics.enabled }}
    - name: metrics
      port: {{ .Values.gateway.metricsPort }}
      targetPort: metrics
    {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tessera.fullname" . }}-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tessera.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  replicas: {{ .Values.gateway.replicaCount }}
  selector:
    matchLabels:
      {{- include "tessera.selectorLabels" (merge (dict "component" "gateway") .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tessera.selectorLabels" (merge (dict "component" "gateway") .) | nindent 8 }}
      {{- if and .Values.metrics.enabled .Values.metrics.prometheusAnnotations }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.gateway.metricsPort | quote }}
        prometheus.io/path: /metrics
      {{- end }}
    spec:
      automountServiceAccountToken: false
      containers:
        - name: gateway
          image: {{ include "tessera.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["tessera-gateway"]
          env:
            - name: RUST_LOG
              value: {{ .Values.logLevel | quote }}
            - name: TESSERA_ORCH_ADDR
              value: {{ printf "%s-orchestrator:%v" (include "tessera.fullname" .) .Values.orchestrator.servicePort | quote }}
            - name: TESSERA_GW_ADDR
              value: {{ printf "0.0.0.0:%v" .Values.gateway.servicePort | quote }}
            - name: TESSERA_WORKER_ADDR
              value: {{ printf "%s:%v" (include "tessera.workerName" (dict "root" . "worker" $firstWorker)) .Values.worker.servicePort | quote }}
            {{- if .Values.metrics.enabled }}
            - name: TESSERA_GW_METRICS_ADDR
              value: {{ printf "0.0.0.0:%v" .Values.gateway.metricsPort | quote }}
            {{- end }}
          ports:
            - name: client
              containerPort: {{ .Values.gateway.servicePort }}
            {{- if .Values.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.gateway.metricsPort }}
            {{- end }}
          readinessProbe:
            {{- if .Values.metrics.enabled }}
            httpGet:
              path: /ready
              port: metrics
            {{- else }}
            tcpSocket:
              port: client
            {{- end }}
            initialDelaySeconds: {{ .Values.probes.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.failureThreshold }}
          livenessProbe:
            tcpSocket:
              port: client
            initialDelaySeconds: {{ .Values.probes.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.failureThreshold }}
