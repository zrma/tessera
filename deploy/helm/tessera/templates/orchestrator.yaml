apiVersion: v1
kind: Service
metadata:
  name: {{ include "tessera.fullname" . }}-orchestrator
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tessera.labels" . | nindent 4 }}
    app.kubernetes.io/component: orchestrator
spec:
  type: ClusterIP
  selector:
    {{- include "tessera.selectorLabels" (merge (dict "component" "orchestrator") .) | nindent 4 }}
  ports:
    - name: grpc
      port: {{ .Values.orchestrator.servicePort }}
      targetPort: grpc
    {{- if .Values.metrics.enabled }}
    - name: metrics
      port: {{ .Values.orchestrator.metricsPort }}
      targetPort: metrics
    {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tessera.fullname" . }}-orchestrator
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tessera.labels" . | nindent 4 }}
    app.kubernetes.io/component: orchestrator
spec:
  replicas: 1
  {{- if .Values.persistence.enabled }}
  strategy:
    type: Recreate
  {{- end }}
  selector:
    matchLabels:
      {{- include "tessera.selectorLabels" (merge (dict "component" "orchestrator") .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tessera.selectorLabels" (merge (dict "component" "orchestrator") .) | nindent 8 }}
      annotations:
        checksum/orchestrator-config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if and .Values.metrics.enabled .Values.metrics.prometheusAnnotations }}
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.orchestrator.metricsPort | quote }}
        prometheus.io/path: /metrics
        {{- end }}
    spec:
      automountServiceAccountToken: false
      containers:
        - name: orchestrator
          image: {{ include "tessera.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["tessera-orch"]
          env:
            - name: RUST_LOG
              value: {{ .Values.logLevel | quote }}
            - name: TESSERA_ORCH_ADDR
              value: {{ printf "0.0.0.0:%v" .Values.orchestrator.servicePort | quote }}
            - name: TESSERA_ORCH_CONFIG
              value: /etc/tessera/orch-config.json
            - name: TESSERA_ORCH_OPERATOR_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.existingSecret }}
                  key: {{ .Values.auth.operatorTokenKey }}
            - name: TESSERA_ORCH_SPLIT_MERGE_ACTIVATION
              value: {{ .Values.runtime.splitMergeActivation | quote }}
            - name: TESSERA_ORCH_OPERATION_EXECUTION
              value: {{ .Values.runtime.operationExecution | quote }}
            {{- if .Values.metrics.enabled }}
            - name: TESSERA_ORCH_METRICS_ADDR
              value: {{ printf "0.0.0.0:%v" .Values.orchestrator.metricsPort | quote }}
            {{- end }}
            {{- if .Values.persistence.enabled }}
            - name: TESSERA_ORCH_ASSIGNMENT_STATE_PATH
              value: /var/lib/tessera/assignment-state.json
            - name: TESSERA_ORCH_OPERATION_LEDGER_PATH
              value: /var/lib/tessera/operation-ledger.json
            {{- end }}
          ports:
            - name: grpc
              containerPort: {{ .Values.orchestrator.servicePort }}
            {{- if .Values.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.orchestrator.metricsPort }}
            {{- end }}
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: {{ .Values.probes.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.failureThreshold }}
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: {{ .Values.probes.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.failureThreshold }}
          volumeMounts:
            - name: orchestrator-config
              mountPath: /etc/tessera
              readOnly: true
            {{- if .Values.persistence.enabled }}
            - name: orchestrator-state
              mountPath: /var/lib/tessera
            {{- end }}
      volumes:
        - name: orchestrator-config
          configMap:
            name: {{ include "tessera.fullname" . }}-orchestrator
        {{- if .Values.persistence.enabled }}
        - name: orchestrator-state
          {{- if eq .Values.persistence.type "emptyDir" }}
          emptyDir: {}
          {{- else if eq .Values.persistence.type "existingClaim" }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim }}
          {{- else }}
          persistentVolumeClaim:
            claimName: {{ include "tessera.fullname" . }}-orchestrator-state
          {{- end }}
        {{- end }}
