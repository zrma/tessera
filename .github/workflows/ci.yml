name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        run: rustup toolchain install 1.89.0 --profile minimal --component rustfmt --component clippy

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Run workspace verification
        run: cargo xt

      - name: Run tests
        run: cargo test

      - name: Run local smoke
        run: |
          set -euo pipefail
          trap 'cargo xt dev down --with-orch || true' EXIT
          cargo xt dev up --with-orch
          cargo run -p tessera-client -- ping --ts 123
          cargo xt dev down --with-orch
