syntax = "proto3";

package tessera.orch.v1;

option go_package = "tessera/orch/v1";

message WorkerRegistration {
  string worker_id = 1;
  string addr = 2;
}

message AssignmentQuery {
  string worker_id = 1;
}

message Assignment {
  uint32 world = 1;
  sint32 cx = 2;
  sint32 cy = 3;
  uint32 depth = 4;
  uint32 sub = 5;
}

message AssignmentSnapshot {
  repeated Assignment cells = 1;
}

message AssignmentBundle {
  string worker_id = 1;
  string addr = 2;
  repeated Assignment cells = 3;
}

message ListAssignmentsRequest {}
message WatchAssignmentsRequest {}
message HealthCheckRequest {}
message GetMetricsRequest {}

message SplitChildTarget {
  uint32 sub = 1;
  string target_worker_id = 2;
  Assignment cell = 3;
}

message StagedSplitChildAssignment {
  Assignment cell = 1;
  string target_worker_id = 2;
}

message SplitActivationRequest {
  string operation_id = 1;
  Assignment parent = 2;
  repeated SplitChildTarget targets = 3;
}

enum SplitActivationState {
  SPLIT_ACTIVATION_STATE_UNSPECIFIED = 0;
  SPLIT_ACTIVATION_STATE_DISABLED = 1;
  SPLIT_ACTIVATION_STATE_REJECTED = 2;
  SPLIT_ACTIVATION_STATE_STAGED = 3;
  SPLIT_ACTIVATION_STATE_PUBLISHED = 4;
  SPLIT_ACTIVATION_STATE_FAILED = 5;
}

message SplitActivationResponse {
  bool accepted = 1;
  SplitActivationState state = 2;
  string reason = 3;
  string source_worker_id = 4;
  repeated StagedSplitChildAssignment staged_children = 5;
  bool assignments_changed = 6;
}

message MergeActivationRequest {
  string operation_id = 1;
  Assignment parent = 2;
  string owner_worker_id = 3;
}

enum MergeActivationState {
  MERGE_ACTIVATION_STATE_UNSPECIFIED = 0;
  MERGE_ACTIVATION_STATE_DISABLED = 1;
  MERGE_ACTIVATION_STATE_REJECTED = 2;
  MERGE_ACTIVATION_STATE_PUBLISHED = 3;
  MERGE_ACTIVATION_STATE_FAILED = 4;
}

message MergeActivationResponse {
  bool accepted = 1;
  MergeActivationState state = 2;
  string reason = 3;
  string owner_worker_id = 4;
  repeated Assignment merged_children = 5;
  bool assignments_changed = 6;
}

enum HandoverCommand {
  HANDOVER_COMMAND_UNSPECIFIED = 0;
  HANDOVER_COMMAND_PRE_COPY = 1;
  HANDOVER_COMMAND_FREEZE = 2;
  HANDOVER_COMMAND_DIFF = 3;
  HANDOVER_COMMAND_COMMIT = 4;
  HANDOVER_COMMAND_ABORT = 5;
}

enum HandoverState {
  HANDOVER_STATE_UNSPECIFIED = 0;
  HANDOVER_STATE_IDLE = 1;
  HANDOVER_STATE_PRE_COPYING = 2;
  HANDOVER_STATE_FROZEN = 3;
  HANDOVER_STATE_DIFFING = 4;
  HANDOVER_STATE_COMMITTED = 5;
  HANDOVER_STATE_ABORTED = 6;
}

enum HandoverClientMovePolicy {
  HANDOVER_CLIENT_MOVE_POLICY_UNSPECIFIED = 0;
  HANDOVER_CLIENT_MOVE_POLICY_ALLOW = 1;
  HANDOVER_CLIENT_MOVE_POLICY_REJECT_DURING_FREEZE = 2;
}

enum HandoverFailurePolicy {
  HANDOVER_FAILURE_POLICY_UNSPECIFIED = 0;
  HANDOVER_FAILURE_POLICY_KEEP_SOURCE_AND_ABORT = 1;
}

message HandoverCommandRequest {
  string operation_id = 1;
  Assignment cell = 2;
  string source_worker_id = 3;
  string target_worker_id = 4;
  HandoverCommand command = 5;
}

message HandoverCommandResponse {
  bool accepted = 1;
  HandoverState state = 2;
  string reason = 3;
  HandoverClientMovePolicy client_move_policy = 4;
  HandoverFailurePolicy failure_policy = 5;
  bool assignments_changed = 6;
}

message HandoverStatus {
  string operation_id = 1;
  Assignment cell = 2;
  string source_worker_id = 3;
  string target_worker_id = 4;
  HandoverState state = 5;
  HandoverClientMovePolicy client_move_policy = 6;
}

message AssignmentListing {
  repeated AssignmentBundle workers = 1;
  repeated HandoverStatus handovers = 2;
}

message WorkerHealth {
  string worker_id = 1;
  string configured_addr = 2;
  string runtime_addr = 3;
  bool registered = 4;
  uint64 assigned_cells = 5;
  uint64 last_seen_unix_secs = 6;
  bool addr_matches_config = 7;
}

message OrchestratorHealth {
  string status = 1;
  uint64 configured_workers = 2;
  uint64 registered_workers = 3;
  uint64 assigned_cells = 4;
  repeated WorkerHealth workers = 5;
}

message OrchestratorMetrics {
  uint64 configured_workers = 1;
  uint64 registered_workers = 2;
  uint64 assigned_cells = 3;
  uint64 empty_workers = 4;
  uint64 addr_mismatch_workers = 5;
  uint64 registration_attempts = 6;
  uint64 unknown_worker_registrations = 7;
  uint64 assignment_snapshot_requests = 8;
  uint64 listing_requests = 9;
  uint64 watch_streams_started = 10;
  uint64 listing_updates = 11;
}

service Orchestrator {
  rpc RegisterWorker(WorkerRegistration) returns (AssignmentSnapshot);
  rpc GetAssignments(AssignmentQuery) returns (AssignmentSnapshot);
  rpc ListAssignments(ListAssignmentsRequest) returns (AssignmentListing);
  rpc WatchAssignments(WatchAssignmentsRequest) returns (stream AssignmentListing);
  rpc GetHealth(HealthCheckRequest) returns (OrchestratorHealth);
  rpc GetMetrics(GetMetricsRequest) returns (OrchestratorMetrics);
  rpc SubmitHandoverCommand(HandoverCommandRequest) returns (HandoverCommandResponse);
  rpc SubmitSplitActivation(SplitActivationRequest) returns (SplitActivationResponse);
  rpc SubmitMergeActivation(MergeActivationRequest) returns (MergeActivationResponse);
}
